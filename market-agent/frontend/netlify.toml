# Set the Netlify site's "Base directory" to market-agent/frontend.
# Paths below are relative to that base.
[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Basic Auth gate (demo/hackathon). Override via Netlify env BASIC_AUTH_USER/PASS.
[[edge_functions]]
  path = "/*"
  function = "auth"
